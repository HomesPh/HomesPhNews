version: '3.8'

services:
  articles:
    build:
      context: ./articles
      dockerfile: Dockerfile
    ports:
      - "8011:8011"
    env_file:
      - ./articles/.env
    depends_on:
      - redis
    restart: unless-stopped

  restaurants:
    build:
      context: ./restaurants
      dockerfile: Dockerfile
    ports:
      - "8012:8012"
    env_file:
      - ./restaurants/.env
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
